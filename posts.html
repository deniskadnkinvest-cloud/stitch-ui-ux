<style>
  .popup-overlay{position:fixed;inset:0;background:rgba(25,28,33,.5);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:100;animation:fadeIn .2s ease}
  .popup-overlay.show{display:flex}
  .popup-card{background:#fff;border-radius:24px;padding:32px;max-width:440px;width:90%;box-shadow:0 24px 64px -12px rgba(25,28,33,.2);animation:popIn .25s cubic-bezier(.2,.9,.3,1.2)}
  .popup-title{font-family:Manrope,sans-serif;font-weight:800;font-size:22px;margin-bottom:8px;color:#191c21}
  .popup-text{color:#424752;font-size:15px;line-height:1.5;margin-bottom:20px;white-space:pre-line}
  .popup-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:20px}
  .popup-btn{padding:12px 24px;border-radius:999px;font-weight:600;font-size:14px;cursor:pointer;transition:all .15s;border:none;font-family:Inter,sans-serif}
  .popup-btn-primary{background:#00488d;color:#fff}
  .popup-btn-primary:hover{background:#005fb8}
  .popup-btn-secondary{background:#f2f3fb;color:#191c21}
  .popup-btn-secondary:hover{background:#e7e8f0}
  .popup-btn-danger{background:#ba1a1a;color:#fff}
  .popup-tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .popup-tile{padding:14px;border:1px solid #c2c6d4;border-radius:14px;cursor:pointer;text-align:center;font-weight:600;transition:all .15s;font-family:Inter,sans-serif;font-size:14px;background:#fff;color:#191c21}
  .popup-tile:hover{border-color:#00488d;background:#f2f3fb}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#191c21;color:#fff;padding:14px 24px;border-radius:999px;font-weight:500;box-shadow:0 12px 32px -8px rgba(0,0,0,.3);z-index:200;animation:toastIn .3s cubic-bezier(.2,.9,.3,1.2);font-family:Inter,sans-serif;font-size:14px}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
<div id="popup-root"></div>
<script>
(function(){
  const POPUPS = {
    connect:{title:'Подключение аккаунта',text:'Выберите платформу, к которой хотите подключить аккаунт:',tiles:['Instagram','YouTube','TikTok','Telegram','VK','Threads']},
    publish:{title:'Опубликовать пост?',text:'Пост будет опубликован сразу во все выбранные соцсети.',confirm:'Опубликовать',toast:'Опубликовано ✓'},
    delete:{title:'Удалить?',text:'Это действие нельзя отменить.',confirm:'Удалить',toast:'Удалено',danger:true},
    save:{toast:'Сохранено ✓'},
    refresh:{toast:'Обновлено ✓'},
    export:{toast:'Файл готовится к скачиванию…'},
    generate:{title:'Генерация контента',text:'AI подбирает заголовок и текст под ваш сегмент. Это займёт несколько секунд…',confirm:'Вставить',toast:'Сгенерировано ✓'},
    notifications:{title:'Уведомления',text:'• Новый комментарий под постом «Как мы выросли x3»\n• План на понедельник готов к публикации\n• +1240 новых подписчиков за неделю'},
    share:{title:'Поделиться',text:'Скопируйте ссылку и отправьте:\nhttps://content-zavod.ru/p/abc123',confirm:'Скопировать',toast:'Скопировано ✓'},
    filter:{title:'Фильтр',text:'Выберите диапазон:',tiles:['Сегодня','Неделя','Месяц','Всё время']},
    profile:{title:'Профиль',text:'Вы вошли как: @creative_studio\nПлан: Pro\nСледующее списание: 12 мая',confirm:'Выйти',toast:'Вы вышли'},
    edit:{title:'Редактирование',text:'Изменения применяются автоматически. Продолжайте работу.',confirm:'OK'},
    upgrade:{title:'Обновление тарифа',text:'Перейти на тариф Pro за 2990 ₽/мес и снять все ограничения?',confirm:'Перейти на Pro',toast:'Переход на Pro ✓'},
    integration:{title:'Интеграция',text:'Выберите сервис для подключения:',tiles:['Google Analytics','Яндекс.Метрика','Slack','Notion','Zapier','Webhook']},
    ai:{title:'AI-ассистент',text:'Чем могу помочь? Я умею:\n• Писать посты в вашем стиле\n• Предлагать темы\n• Переписывать под формат',confirm:'Начать'},
  };
  function showToast(msg){
    const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);
    setTimeout(()=>t.remove(),2200);
  }
  window.__toast=showToast;
  function show(type){
    const cfg=POPUPS[type];if(!cfg){showToast('Скоро будет доступно');return;}
    if(!cfg.title && cfg.toast){showToast(cfg.toast);return;}
    const root=document.getElementById('popup-root');
    const tiles=cfg.tiles?`<div class="popup-tiles">${cfg.tiles.map(t=>`<div class="popup-tile" data-tile="${t}">${t}</div>`).join('')}</div>`:'';
    const confirmCls=cfg.danger?'popup-btn popup-btn-danger':'popup-btn popup-btn-primary';
    const actions=cfg.confirm?`<div class="popup-actions"><button class="popup-btn popup-btn-secondary" data-close>Отмена</button><button class="${confirmCls}" data-confirm>${cfg.confirm}</button></div>`:`<div class="popup-actions"><button class="popup-btn popup-btn-primary" data-close>Закрыть</button></div>`;
    root.innerHTML=`<div class="popup-overlay show" data-overlay><div class="popup-card"><div class="popup-title">${cfg.title}</div><div class="popup-text">${cfg.text||''}</div>${tiles}${actions}</div></div>`;
    root.querySelector('[data-overlay]').addEventListener('click',e=>{if(e.target.hasAttribute('data-overlay'))root.innerHTML='';});
    root.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',()=>root.innerHTML=''));
    root.querySelectorAll('[data-tile]').forEach(t=>t.addEventListener('click',()=>{const n=t.dataset.tile;root.innerHTML='';showToast('Выбрано: '+n);}));
    const conf=root.querySelector('[data-confirm]');
    if(conf)conf.addEventListener('click',()=>{root.innerHTML='';if(cfg.toast)showToast(cfg.toast);});
  }
  window.__popup=show;
  document.addEventListener('click',e=>{
    const b=e.target.closest('[data-popup]');
    if(b){e.preventDefault();show(b.dataset.popup);}
  });
})();
</script>
